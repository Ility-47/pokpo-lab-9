name: .NET CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Restore dependencies
        run: dotnet restore lab7.sln

      - name: Build solution
        run: dotnet build lab7.sln --configuration Release --no-restore

      - name: Verify whitespace formatting
        run: dotnet format whitespace lab7.sln --verify-no-changes --no-restore

      - name: Install complexity analyzer
        run: python -m pip install lizard

      - name: Analyze cyclomatic complexity
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          lizard .\MediaShareApp -l csharp -x .\MediaShareApp\bin\* -x .\MediaShareApp\obj\* | Tee-Object -FilePath .\artifacts\complexity-report.txt

      - name: Upload static analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-artifacts
          path: artifacts

  unit-tests:
    name: Unit Tests
    needs: static-analysis
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore lab7.sln

      - name: Build solution
        run: dotnet build lab7.sln --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: >
          dotnet test MediaShareApp.Tests/MediaShareApp.Tests.csproj
          --configuration Release
          --no-build
          --filter "TestCategory=Unit"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults/Unit

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/Unit

  integration-tests:
    name: Integration Tests
    needs: static-analysis
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore lab7.sln

      - name: Build solution
        run: dotnet build lab7.sln --configuration Release --no-restore

      - name: Run integration tests with coverage
        run: >
          dotnet test MediaShareApp.Tests/MediaShareApp.Tests.csproj
          --configuration Release
          --no-build
          --filter "TestCategory=Integration"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./TestResults/Integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/Integration

  coverage-report:
    name: Coverage Report
    needs:
      - unit-tests
      - integration-tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/Unit

      - name: Download integration test results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/Integration

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        shell: pwsh
        run: |
          reportgenerator `
            -reports:"./TestResults/**/coverage.cobertura.xml" `
            -targetdir:"./coveragereport" `
            -reporttypes:"Html;TextSummary"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport
